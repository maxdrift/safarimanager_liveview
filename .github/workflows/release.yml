  build-app:
    strategy:
      # keep building for one target even if other targets fail
      fail-fast: false
      matrix:
        os: [macOS]
        target: [ARM64, X64]
    runs-on: [self-hosted, "${{ matrix.os }}", "${{ matrix.target }}"]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Mix Deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-${{ matrix.target }}-mix-${{ hashFiles('**/mix.lock') }}
      - name: Cache Bootstrap OTP
        uses: actions/cache@v4
        with:
          path: elixirkit/otp_bootstrap/_build/otp-rel-${{ env.otp }}-openssl-1.1.1s-macos-universal
          key: ${{ runner.os }}-${{ matrix.target }}-bootstrap-${{ env.otp }}-${{ hashFiles('elixirkit/otp_bootstrap/build.sh') }}
      - name: Cache Elixir
        uses: actions/cache@v4
        with:
          path: _build/elixir-${{ env.elixir }}
          key: ${{ runner.os }}-${{ matrix.target }}-elixir-${{ env.elixir }}
      - name: Build the app
        run: .github/scripts/app/build_macos.sh
        env:
          OTP_VERSION: ${{ env.otp }}
          ELIXIR_VERSION: ${{ env.elixir }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          LV_SIGNING_SALT: ${{ secrets.LV_SIGNING_SALT }}
          PROMETHEUS_PUSH_GW_USER: ${{ secrets.PROMETHEUS_PUSH_GW_USER }}
          PROMETHEUS_PUSH_GW_PASSWORD: ${{ secrets.PROMETHEUS_PUSH_GW_PASSWORD }}
          ELIXIRKIT_CODESIGN_IDENTITY: ${{ secrets.ELIXIRKIT_CODESIGN_IDENTITY }}
          SM_LOCALE: it
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: rel/app/macos/.build/SafarimanagerInstall-${{ github.ref_name }}-*-*.dmg
