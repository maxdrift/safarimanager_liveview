name: Release
on:
  push:
    tags:
      - "v*.*.*"

# Required for tauri-action to upload assets and merge updater JSON into the release.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    permissions:
      contents: write
    # Runner labels match the ElixirKit Tauri guide:
    # https://github.com/livebook-dev/elixirkit/blob/main/guides/tauri.md
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-2022
            args: --target x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: OTP / Elixir versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          . ./versions
          echo "otp=$otp" >> "$GITHUB_OUTPUT"
          echo "elixir=$elixir" >> "$GITHUB_OUTPUT"

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ steps.versions.outputs.otp }}
          elixir-version: ${{ steps.versions.outputs.elixir }}
          version-type: strict

      - name: Cache Mix deps and build (prod)
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-prod-${{ runner.os }}-${{ runner.arch }}-${{ steps.versions.outputs.otp }}-${{ steps.versions.outputs.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-prod-${{ runner.os }}-${{ runner.arch }}-${{ steps.versions.outputs.otp }}-${{ steps.versions.outputs.elixir }}-
            mix-prod-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Enable corepack (yarn)
        run: corepack enable

      - name: Start epmd (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: $(elixir -e 'IO.puts "#{:code.root_dir()}/erts-#{:erlang.system_info(:version)}"')/bin/epmd.exe -daemon

      - name: Add tar (Windows)
        if: runner.os == 'Windows'
        run: |
          "C:\Program Files\Git\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Install mix deps (prod)
        env:
          MIX_ENV: prod
        run: mix deps.get --only prod

      - name: Install frontend deps (assets)
        run: yarn --cwd assets install --frozen-lockfile

      - name: Build Elixir release for Tauri bundle
        env:
          MIX_ENV: prod
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          LV_SIGNING_SALT: ${{ secrets.LV_SIGNING_SALT }}
        shell: bash
        run: bash scripts/tauri_prebuild.sh

      # From-source C NIFs on Windows (e.g. bcrypt_elixir) link dynamically
      # against the MSVC runtime (msvcp140.dll, vcruntime140*.dll). End-user
      # machines without (a sufficiently recent) Visual C++ Redistributable
      # fail at on_load with the misleading "specified module could not be
      # found" error. OTP's NIF loader uses plain LoadLibrary, so dependent
      # DLLs are resolved against erl.exe's directory (the erts bin dir),
      # NOT the NIF's own priv dir -- drop them there.
      #
      # The runtime version is whatever ships with the pinned runner image
      # (windows-2022 -> VS 2022 toolset). Re-verify after any runner bump.
      - name: Bundle MSVC runtime for from-source C NIFs (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ERTS_BIN=$(ls -d src-tauri/target/rel/erts-*/bin | head -n1)
          test -d "$ERTS_BIN" || { echo "erts bin dir not found under src-tauri/target/rel"; exit 1; }

          # Sanity-check that from-source C NIFs actually built. The bcrypt
          # on_load error swallows the real reason; this turns a silent
          # missing-DLL into a loud build failure.
          BCRYPT_DLL=$(ls src-tauri/target/rel/lib/bcrypt_elixir-*/priv/bcrypt_nif.dll 2>/dev/null | head -n1 || true)
          test -n "$BCRYPT_DLL" || { echo "bcrypt_nif.dll missing -- bcrypt_elixir didn't compile"; exit 1; }
          echo "Built NIF present: $BCRYPT_DLL"

          for dll in vcruntime140.dll vcruntime140_1.dll msvcp140.dll; do
            src="/c/Windows/System32/$dll"
            test -f "$src" || { echo "missing $src on runner"; exit 1; }
            cp "$src" "$ERTS_BIN/"
          done
          echo "Bundled MSVC runtime into $ERTS_BIN:"
          ls -la "$ERTS_BIN" | grep -Ei 'vcruntime|msvcp'

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIX_ENV: prod
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          LV_SIGNING_SALT: ${{ secrets.LV_SIGNING_SALT }}
          SM_LOCALE: ${{ secrets.SM_LOCALE != '' && secrets.SM_LOCALE || 'it' }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL != '' && secrets.LOG_LEVEL || 'info' }}
          DIRECT_FILE_UPLOAD: ${{ secrets.DIRECT_FILE_UPLOAD != '' && secrets.DIRECT_FILE_UPLOAD || 'true' }}
          PROMETHEUS_PUSH_GW_USER: ${{ secrets.PROMETHEUS_PUSH_GW_USER }}
          PROMETHEUS_PUSH_GW_PASSWORD: ${{ secrets.PROMETHEUS_PUSH_GW_PASSWORD }}
          # Full contents of updater.key from `tauri signer generate` (see scripts/tauri_updater_keys.sh / README).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.ELIXIRKIT_CODESIGN_IDENTITY }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: Safari Manager ${{ github.ref_name }}
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
