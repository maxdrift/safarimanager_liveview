name: CI

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on: [push]

jobs:
  linux-arm:
    name: Build on Raspberry Pi (Elixir ${{ matrix.elixir_version }}, OTP ${{ matrix.otp_version }})
    runs-on: self-hosted

    strategy:
      matrix:
        elixir_version: ['1.13.4']
        otp_version: ['24.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: APT Update
        run: sudo apt update
      - name: APT Install dependencies
        run: sudo apt install -y wget libssl-dev ncurses-dev
      - name: Download Erlang source
        run: wget https://erlang.org/download/otp_src_${{ matrix.otp_version }}.tar.gz
      - name: Unpack Erlang source
        run: |
          tar -xzvf otp_src_${{ matrix.otp_version }}.tar.gz
          cd otp_src_${{ matrix.otp_version }}/
      - name: Configure Erlang source
        run: ./configure
      - name: Compile Erlang
        run: make
      - name: Install Erlang
        run: sudo make install
      - name: Clean up Erlang source artifacts
        run: |
          cd ..
          rm otp_src_${{ matrix.otp_version }}.tar.gz
          sudo rm -R otp_src_${{ matrix.otp_version }}/
      - name: Restore deps and _build
        uses: actions/cache@v2
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir_version }}-${{ matrix.otp_version }}-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
      - name: Restore plts
        uses: actions/cache@v2
        with:
          path: priv/plts
          key: ${{ runner.os }}-dialyzer-${{ matrix.elixir_version }}-${{ matrix.otp_version }}-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
      - run: mix deps.get
      # - run: MIX_ENV=standalone mix compile
      # - run: mix test
      - run: MIX_ENV=standalone mix setup
      - run: MIX_ENV=standalone mix release
      - name: Peek at the release results
        run: ls -alh _build/standalone/rel/bakeware
      - name: Upload release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-binary
          path: _build/standalone/rel/bakeware/safarimanager
