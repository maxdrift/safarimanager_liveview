name: CI

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on: [push]

jobs:
  linux:
    name: Test on Ubuntu (Elixir ${{ matrix.elixir_version }}, OTP ${{ matrix.otp_version }})
    # runs-on: ubuntu-latest
    runs-on: self-hosted

    strategy:
      matrix:
        elixir_version: ['1.13.4']
        otp_version: ['24.3.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir_version }}
          otp-version: ${{ matrix.otp_version }}
      - name: Restore deps and _build
        uses: actions/cache@v2
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir_version }}-${{ matrix.otp_version }}-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
      - name: Restore plts
        uses: actions/cache@v2
        with:
          path: priv/plts
          key: ${{ runner.os }}-dialyzer-${{ matrix.elixir_version }}-${{ matrix.otp_version }}-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
      - run: mix deps.get
      # - run: MIX_ENV=standalone mix compile
      # - run: mix test
      - run: MIX_ENV=standalone mix setup
      - run: MIX_ENV=standalone mix release
      - name: Peek at the release results
        run: ls -alh _build/standalone/rel/bakeware
      - name: Upload release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-binary
          path: _build/standalone/rel/bakeware/safarimanager
